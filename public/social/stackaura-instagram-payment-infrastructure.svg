<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="96" y1="28" x2="956" y2="1072" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08172D" />
      <stop offset="0.5" stop-color="#0B1F3A" />
      <stop offset="1" stop-color="#102B4A" />
    </linearGradient>
    <radialGradient id="glowTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(808 220) rotate(90) scale(286 352)">
      <stop stop-color="#3B82F6" stop-opacity="0.28" />
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(540 690) rotate(90) scale(250)">
      <stop stop-color="#60A5FA" stop-opacity="0.18" />
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowBottom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(226 900) rotate(90) scale(232 292)">
      <stop stop-color="#3B82F6" stop-opacity="0.14" />
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="core" x1="420" y1="560" x2="662" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12345F" />
      <stop offset="1" stop-color="#0A213D" />
    </linearGradient>
    <linearGradient id="routeLine" x1="190" y1="760" x2="910" y2="520" gradientUnits="userSpaceOnUse">
