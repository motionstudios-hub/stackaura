    <text x="454" y="113" fill="#F7FBFF" font-size="26" font-weight="700" letter-spacing="-0.04em">STACKAURA</text>

    <text class="headline" x="540" y="286" text-anchor="middle">Built for how payments</text>
    <text class="headline" x="540" y="358" text-anchor="middle">actually work.</text>
    <text class="body" x="540" y="432" text-anchor="middle">Routing, fallback, recovery, and visibility — all handled</text>
    <text class="body" x="540" y="465" text-anchor="middle">in one orchestration layer.</text>
  </g>

  <g filter="url(#blurLarge)" opacity="0.18">
    <circle cx="540" cy="694" r="150" fill="#5CB5FF" />
  </g>

