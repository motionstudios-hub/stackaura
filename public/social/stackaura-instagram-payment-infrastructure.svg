    <filter id="pillShadow" x="-80" y="-80" width="1240" height="1240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#04111D" flood-opacity="0.28" />
    </filter>
    <mask id="stackauraMarkMask" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="black" />
      <g transform="translate(50 50) rotate(36) translate(-50 -50)">
