      .eyebrow { fill: #86B5E2; font-size: 16px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; }
      .headline { fill: #F7FBFF; font-size: 72px; font-weight: 720; letter-spacing: -0.064em; }
      .body { fill: #B6CAE0; font-size: 25px; font-weight: 510; letter-spacing: -0.02em; }
      .core-title { fill: #F7FBFF; font-size: 34px; font-weight: 700; letter-spacing: -0.05em; }
      .core-copy { fill: #AFC5DF; font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
