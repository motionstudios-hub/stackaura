      <stop stop-color="#3B82F6" stop-opacity="0.34" />
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowCenter" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(540 834) rotate(90) scale(324)">
      <stop stop-color="#60A5FA" stop-opacity="0.2" />
