      .screenBody { fill: #6A6280; font-size: 18px; font-weight: 550; letter-spacing: -0.02em; }
      .screenSmall { fill: #7B7391; font-size: 14px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase; }
