      .darkTitle { fill: #FFFFFF; font-size: 24px; font-weight: 650; letter-spacing: -0.03em; }
      .darkBody { fill: rgba(255,255,255,0.76); font-size: 16px; font-weight: 500; letter-spacing: -0.02em; }
      .footerDomain { fill: #655C75; font-size: 24px; font-weight: 520; letter-spacing: -0.02em; }
      .footerCopy { fill: #18131F; font-size: 31px; font-weight: 630; letter-spacing: -0.045em; }
      .buttonLabel { fill: #18131F; font-size: 30px; font-weight: 650; letter-spacing: -0.035em; }
