      <stop offset="1" stop-color="#10315A" />
    </linearGradient>
    <radialGradient id="glowTop" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(798 278) rotate(90) scale(352 406)">
      <stop stop-color="#3B82F6" stop-opacity="0.32" />
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowMid" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 974) rotate(90) scale(330 392)">
      <stop stop-color="#60A5FA" stop-opacity="0.14" />
